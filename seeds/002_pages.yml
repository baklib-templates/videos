        - name: "The Paradox of Agency"
          slug: paradox-of-agency
          template_name: page
          settings:
            description: "Explore whether you're living your life or just reacting to everyone else's."
            content: "preset:lesson-body.html"
        - name: "Liberation from Regret"
          slug: liberation-from-regret
          template_name: page
          settings:
            description: "If no alternative choice was ever possible, regret becomes logically unnecessary."
            external_video_url: "https://assets.tailwindcss.com/templates/compass/liberation-from-regret.mp4"
            thumb_image_url: "https://assets.tailwindcss.com/templates/compass/lesson-video-thumbnail-02.png"
            content: "preset:lesson-body.html"

    - name: "Direction: Choosing a Path"
      slug: direction
      template_name: channel
      settings:
        description: "Experience the sensation of choice without the burden of true responsibility."
      children:
        - name: "Mapping the Causal Factors"
          slug: mapping-causal-factors
          template_name: page
          settings:
            description: "The causes acting on you can give you insight into where they might take you."
